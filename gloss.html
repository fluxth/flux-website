<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Classic Gloss Inline Demo</title>
  </head>
  <body class="bg-[#f0f2f5] p-10 font-sans text-slate-800">
    <div class="max-w-4xl mx-auto space-y-10">
      <section class="bg-white p-8 rounded-xl border border-slate-300 shadow-sm">
        <h2 class="text-xl font-bold mb-6 text-slate-600 border-b pb-2">Classic Gloss Buttons</h2>
        <div class="flex flex-wrap gap-4">
          <button
            class="cursor-pointer rounded-lg border border-blue-700 bg-gradient-to-b from-blue-400 via-blue-500 to-blue-600 px-6 py-2 font-semibold text-white shadow-[inset_0_1px_0_rgba(255,255,255,0.4),0_1px_2px_rgba(0,0,0,0.2)] [text-shadow:0_1px_1px_rgba(0,0,0,0.4)] transition-all hover:from-blue-500 hover:to-blue-700 active:translate-y-[1px] active:shadow-[inset_0_3px_5px_rgba(0,0,0,0.2)]"
          >
            Primary Gloss
          </button>

          <button
            class="rounded-lg border border-green-700 bg-gradient-to-b from-green-400 via-green-500 to-green-600 px-6 py-2 font-semibold text-white shadow-[inset_0_1px_0_rgba(255,255,255,0.4),0_1px_2px_rgba(0,0,0,0.2)] [text-shadow:0_1px_1px_rgba(0,0,0,0.4)] transition-all hover:from-green-500 hover:to-green-700 active:translate-y-[1px] active:shadow-[inset_0_3px_5px_rgba(0,0,0,0.2)]"
          >
            Success Gloss
          </button>

          <button
            class="rounded-lg border border-red-700 bg-gradient-to-b from-red-400 via-red-500 to-red-600 px-6 py-2 font-semibold text-white shadow-[inset_0_1px_0_rgba(255,255,255,0.4),0_1px_2px_rgba(0,0,0,0.2)] [text-shadow:0_1px_1px_rgba(0,0,0,0.4)] transition-all hover:from-red-500 hover:to-red-700 active:translate-y-[1px] active:shadow-[inset_0_3px_5px_rgba(0,0,0,0.2)]"
          >
            Danger Gloss
          </button>

          <button
            class="rounded-lg border border-amber-600 bg-gradient-to-b from-amber-300 via-amber-400 to-amber-500 px-6 py-2 font-semibold text-white shadow-[inset_0_1px_0_rgba(255,255,255,0.4),0_1px_2px_rgba(0,0,0,0.2)] [text-shadow:0_1px_1px_rgba(0,0,0,0.4)] transition-all hover:from-amber-400 hover:to-amber-600 active:translate-y-[1px] active:shadow-[inset_0_3px_5px_rgba(0,0,0,0.2)]"
          >
            Warning Gloss
          </button>

          <button
            class="rounded-lg border border-cyan-700 bg-gradient-to-b from-cyan-400 via-cyan-500 to-cyan-600 px-6 py-2 font-semibold text-white shadow-[inset_0_1px_0_rgba(255,255,255,0.4),0_1px_2px_rgba(0,0,0,0.2)] [text-shadow:0_1px_1px_rgba(0,0,0,0.4)] transition-all hover:from-cyan-500 hover:to-cyan-700 active:translate-y-[1px] active:shadow-[inset_0_3px_5px_rgba(0,0,0,0.2)]"
          >
            Info Gloss
          </button>
        </div>
      </section>

      <div class="grid md:grid-cols-2 gap-8">
        <div class="rounded-lg overflow-hidden border border-slate-300 shadow-md bg-white">
          <div
            class="px-4 py-2 bg-gradient-to-b from-slate-500 via-slate-600 to-slate-700 border-b border-slate-800 text-white font-bold [text-shadow:0_1px_1px_rgba(0,0,0,0.4)] shadow-[inset_0_1px_0_rgba(255,255,255,0.2)]"
          >
            System Panel
          </div>
          <div class="p-6 space-y-4">
            <p class="text-sm text-slate-600">
              The progress bar also shares the "Classic Gloss" via-stop theme:
            </p>
            <div
              class="w-full h-5 bg-slate-200 rounded-full border border-slate-300 shadow-[inset_0_2px_3px_rgba(0,0,0,0.1)] overflow-hidden"
            >
              <div
                class="h-full w-[75%] bg-gradient-to-b from-blue-400 via-blue-500 to-blue-600 shadow-[inset_0_1px_0_rgba(255,255,255,0.4)] border-r border-blue-700"
              ></div>
            </div>
          </div>
        </div>

        <div
          class="rounded-lg overflow-hidden border border-slate-300 shadow-md bg-white p-6 space-y-4"
        >
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1"
              >Sunken Input Field</label
            >
            <input
              type="text"
              placeholder="This looks carved in..."
              class="w-full px-3 py-2 rounded border border-slate-300 bg-white shadow-[inset_0_1px_3px_rgba(0,0,0,0.15)] focus:outline-none focus:ring-2 focus:ring-blue-500/40"
            />
          </div>
          <button
            class="w-full rounded-lg border border-slate-400 bg-gradient-to-b from-slate-100 via-slate-200 to-slate-300 px-6 py-2 font-bold text-slate-700 shadow-[inset_0_1px_0_white,0_1px_2px_rgba(0,0,0,0.1)] transition-all hover:from-white hover:to-slate-200 active:translate-y-[1px] active:shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)]"
          >
            Secondary Gloss Action
          </button>
        </div>
      </div>

      <section class="bg-white p-8 rounded-xl border border-slate-300 shadow-sm">
        <h2 class="text-xl font-bold mb-6 text-slate-600 border-b pb-2">Navigation Tabs</h2>
        <div class="flex border-b border-slate-300">
          <button
            class="px-6 py-2 rounded-t-lg border-t border-l border-r border-slate-400 bg-gradient-to-b from-white via-slate-100 to-slate-200 font-bold text-blue-700 shadow-[inset_0_1px_0_white] relative z-10 -mb-[1px]"
          >
            Active Tab
          </button>
          <button
            class="px-6 py-2 rounded-t-lg border-t border-l border-r border-transparent font-medium text-slate-500 hover:bg-slate-100 transition-colors"
          >
            Inactive
          </button>
          <button
            class="px-6 py-2 rounded-t-lg border-t border-l border-r border-transparent font-medium text-slate-500 hover:bg-slate-100 transition-colors"
          >
            Settings
          </button>
        </div>
      </section>

      <div class="grid md:grid-cols-2 gap-8">
        <div class="bg-white p-6 rounded-xl border border-slate-300 shadow-sm">
          <h3 class="text-sm font-bold text-slate-500 uppercase mb-4">System Status</h3>
          <div class="flex flex-wrap gap-3">
            <span
              class="px-3 py-0.5 rounded-full text-xs font-bold text-white bg-gradient-to-b from-emerald-400 to-emerald-600 border border-emerald-700 shadow-[inset_0_1px_0_rgba(255,255,255,0.3)] [text-shadow:0_1px_1px_rgba(0,0,0,0.3)]"
            >
              ONLINE
            </span>
            <span
              class="px-3 py-0.5 rounded-full text-xs font-bold text-white bg-gradient-to-b from-slate-400 to-slate-600 border border-slate-700 shadow-[inset_0_1px_0_rgba(255,255,255,0.3)] [text-shadow:0_1px_1px_rgba(0,0,0,0.3)]"
            >
              STBY
            </span>
            <span
              class="px-3 py-0.5 rounded-full text-xs font-bold text-white bg-gradient-to-b from-orange-400 to-orange-600 border border-orange-700 shadow-[inset_0_1px_0_rgba(255,255,255,0.3)] [text-shadow:0_1px_1px_rgba(0,0,0,0.3)]"
            >
              AWAY
            </span>
          </div>
        </div>

        <div
          class="bg-white p-6 rounded-xl border border-slate-300 shadow-sm flex items-center justify-between"
        >
          <span class="font-bold text-slate-600">Hardware Acceleration</span>
          <button
            class="w-14 h-7 bg-slate-300 rounded-full border border-slate-400 shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] p-1 relative"
          >
            <div
              class="w-5 h-5 rounded-full bg-gradient-to-b from-white via-slate-100 to-slate-300 border border-slate-400 shadow-md"
            ></div>
          </button>
        </div>
      </div>

      <div
        class="bg-amber-50 border border-amber-300 rounded-lg p-4 flex items-start space-x-3 shadow-sm bg-gradient-to-r from-amber-50 to-white"
      >
        <div
          class="flex-shrink-0 w-6 h-6 rounded-full bg-gradient-to-b from-amber-400 to-amber-600 border border-amber-700 text-white text-xs flex items-center justify-center font-bold shadow-[inset_0_1px_0_rgba(255,255,255,0.4)]"
        >
          !
        </div>
        <div>
          <h4 class="text-sm font-bold text-amber-900">Storage Warning</h4>
          <p class="text-xs text-amber-800">
            Your account is reaching its limit. Please upgrade to avoid service interruption.
          </p>
        </div>
      </div>

      <div class="bg-white p-8 rounded-xl border border-slate-300 shadow-sm">
        <p class="text-xs font-bold text-slate-500 mb-2 uppercase">Refined Button Style</p>
        <button
          class="rounded-lg border border-slate-300 bg-gradient-to-b from-slate-50 via-slate-100 to-slate-200 px-6 py-2 font-bold text-slate-600 shadow-[inset_0_1px_0_white,0_1px_1px_rgba(0,0,0,0.05)] transition-all hover:from-white hover:to-slate-100 active:translate-y-[1px] active:shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)]"
        >
          Soft Secondary Action
        </button>
      </div>
    </div>
  </body>
</html>
